<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
    <alias>
        <family>sans-serif</family>
        <prefer>
            <family>Inter</family>
            <family>IPAPGothic</family>
        </prefer>
    </alias>
    <alias>
        <family>serif</family>
        <prefer>
            <family>FreeSerif</family>
        </prefer>
    </alias>
    <alias>
        <family>monospace</family>
        <prefer>
            <family>Meslo LG M</family>
        </prefer>
    </alias>
</fontconfig>
